<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(15, 23, 42, 0.95);
            --accent: #38bdf8;
            --accent-dark: #22c55e;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --danger: #fb7185;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 28%),
                        linear-gradient(180deg, #0f172a 0%, #020617 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .weather-app {
            width: min(100%, 520px);
            background: var(--surface);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
            overflow: hidden;
        }

        .hero {
            padding: 28px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 3vw, 2.6rem);
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 22px;
        }

        .search {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr auto;
            align-items: center;
        }

        .search input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 1rem;
        }

        .search input::placeholder {
            color: rgba(226, 232, 240, 0.65);
        }

        .search button {
            border: none;
            padding: 16px 22px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 180ms ease, filter 180ms ease;
        }

        .search button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .result-card {
            padding: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
            display: grid;
            gap: 22px;
        }

        .result-card.hidden {
            display: none;
        }

        .weather-summary {
            display: flex;
            gap: 18px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .weather-summary .details {
            min-width: 170px;
        }

        .temperature {
            font-size: clamp(2rem, 4vw, 3.4rem);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .description {
            text-transform: capitalize;
            color: var(--accent);
            font-weight: 600;
        }

        .weather-icon {
            width: 96px;
            height: 96px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
        }

        .stat strong {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .stat span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .extra-info {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .extra-row {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .extra-row span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .extra-row strong {
            font-size: 1rem;
        }

        .message {
            border-radius: 18px;
            background: rgba(251, 113, 133, 0.12);
            color: var(--text);
            padding: 14px 18px;
            font-weight: 600;
            display: none;
        }

        .message.visible {
            display: block;
        }

        @media (max-width: 480px) {
            .weather-summary {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats,
            .extra-info {
                grid-template-columns: 1fr;
            }

            .search {
                grid-template-columns: 1fr;
            }

            .search button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="weather-app">
        <section class="hero">
            <h1>Weather App</h1>
            <p>Enter a city name to see the current weather, temperature, humidity, wind speed, and more.</p>

            <div class="search">
                <input id="city-input" type="text" placeholder="e.g. London, Tokyo, Karachi" aria-label="City name">
                <button id="get-weather">Get Weather</button>
            </div>

            <div id="message" class="message" role="status"></div>
        </section>

        <section id="weather-card" class="result-card hidden" aria-live="polite">
            <div class="weather-summary">
                <div class="details">
                    <div id="location" class="location"></div>
                    <div id="temperature" class="temperature"></div>
                    <div id="description" class="description"></div>
                </div>
                <img id="weather-icon" class="weather-icon" src="" alt="Weather icon">
            </div>

            <div class="stats">
                <div class="stat">
                    <strong id="humidity">--%</strong>
                    <span>Humidity</span>
                </div>
                <div class="stat">
                    <strong id="wind">-- km/h</strong>
                    <span>Wind</span>
                </div>
                <div class="stat">
                    <strong id="feels-like">--°C</strong>
                    <span>Feels Like</span>
                </div>
                <div class="stat">
                    <strong id="pressure">-- hPa</strong>
                    <span>Pressure</span>
                </div>
                <div class="stat">
                    <strong id="visibility">-- km</strong>
                    <span>Visibility</span>
                </div>
                <div class="stat">
                    <strong id="clouds">--%</strong>
                    <span>Clouds</span>
                </div>
            </div>

            <div class="extra-info">
                <div class="extra-row">
                    <span>Weather</span>
                    <strong id="condition">--</strong>
                </div>
                <div class="extra-row">
                    <span>Local time</span>
                    <strong id="local-time">--</strong>
                </div>
                <div class="extra-row">
                    <span>Sunrise</span>
                    <strong id="sunrise">--</strong>
                </div>
                <div class="extra-row">
                    <span>Sunset</span>
                    <strong id="sunset">--</strong>
                </div>
                <div class="extra-row">
                    <span>Coordinates</span>
                    <strong id="coordinates">--</strong>
                </div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = 'b2893c3fc074b1e782503a64c8506de0';
        const input = document.getElementById('city-input');
        const button = document.getElementById('get-weather');
        const message = document.getElementById('message');
        const weatherCard = document.getElementById('weather-card');
        const locationLabel = document.getElementById('location');
        const temperatureLabel = document.getElementById('temperature');
        const descriptionLabel = document.getElementById('description');
        const humidityLabel = document.getElementById('humidity');
        const windLabel = document.getElementById('wind');
        const feelsLikeLabel = document.getElementById('feels-like');
        const pressureLabel = document.getElementById('pressure');
        const visibilityLabel = document.getElementById('visibility');
        const cloudsLabel = document.getElementById('clouds');
        const conditionLabel = document.getElementById('condition');
        const localTimeLabel = document.getElementById('local-time');
        const sunriseLabel = document.getElementById('sunrise');
        const sunsetLabel = document.getElementById('sunset');
        const coordinatesLabel = document.getElementById('coordinates');
        const weatherIcon = document.getElementById('weather-icon');

        function formatTimestamp(timestamp, timezoneOffset) {
            return new Date((timestamp + timezoneOffset) * 1000)
                .toISOString()
                .substr(11, 5);
        }

        function showMessage(text, type = 'error') {
            message.textContent = text;
            message.classList.add('visible');
            if (type === 'error') {
                message.style.background = 'rgba(251, 113, 133, 0.14)';
            } else {
                message.style.background = 'rgba(56, 189, 248, 0.14)';
            }
        }

        function hideMessage() {
            message.classList.remove('visible');
        }

        function updateWeatherCard(data) {
            const { name, sys, main, weather, wind, clouds, visibility, coord, timezone, dt } = data;
            const title = `${name}, ${sys.country}`;
            const iconCode = weather[0].icon;
            const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

            locationLabel.textContent = title;
            temperatureLabel.textContent = `${Math.round(main.temp)}°C`;
            descriptionLabel.textContent = weather[0].description;
            humidityLabel.textContent = `${main.humidity}%`;
            windLabel.textContent = `${Math.round(wind.speed * 3.6)} km/h`;
            feelsLikeLabel.textContent = `${Math.round(main.feels_like)}°C`;
            pressureLabel.textContent = `${main.pressure} hPa`;
            visibilityLabel.textContent = `${(visibility / 1000).toFixed(1)} km`;
            cloudsLabel.textContent = `${clouds.all}%`;
            conditionLabel.textContent = weather[0].main;
            localTimeLabel.textContent = formatTimestamp(dt, timezone);
            sunriseLabel.textContent = formatTimestamp(sys.sunrise, timezone);
            sunsetLabel.textContent = formatTimestamp(sys.sunset, timezone);
            coordinatesLabel.textContent = `${coord.lat.toFixed(2)}, ${coord.lon.toFixed(2)}`;
            weatherIcon.src = iconUrl;
            weatherIcon.alt = `${weather[0].description} icon`;
            weatherCard.classList.remove('hidden');
        }

        async function fetchWeather(city) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric`
                );
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Unable to fetch weather data.');
                }

                updateWeatherCard(data);
                hideMessage();
            } catch (error) {
                weatherCard.classList.add('hidden');
                showMessage(error.message || 'Please try again later.');
            }
        }

        button.addEventListener('click', () => {
            const city = input.value.trim();
            if (!city) {
                showMessage('Please enter a city name to continue.');
                return;
            }
            fetchWeather(city);
        });

        input.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                button.click();
            }
        });
    </script>
</body>
</html>
